name: Render narration (Piper)

# Sprint 4 — S4-1.
# Manual trigger only. Renders the complete Piper narration corpus (Milo +
# Luna voices) from `content/audio-assets/unit-*.json`, encodes each clip to
# Opus (primary) + MP3 (fallback), refreshes `apps/web/public/audio/`, and
# opens a PR back to the triggering branch with the new binaries (LFS).
#
# Why manual: rendering ~270 clips takes ~3–5 min and burns CI minutes; we
# only want to do it when transcripts genuinely change. The audio manifest
# verifier (`pnpm verify:audio`) runs on every PR as a cheap gate.

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to commit rendered audio to"
        required: true
        default: "claude/english4kids-platform-design-GZQFS"
      voice_set:
        description: "Voice set to render (en_US-amy-medium + en_GB-jenny_dioco-medium)"
        required: false
        default: "default"

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"
  PIPER_VERSION: "2023.11.14-2"
  PIPER_RELEASE: "https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz"
  AMY_VOICE_URL: "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/amy/medium/en_US-amy-medium.onnx"
  AMY_VOICE_JSON: "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/amy/medium/en_US-amy-medium.onnx.json"
  JENNY_VOICE_URL: "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_GB/jenny_dioco/medium/en_GB-jenny_dioco-medium.onnx"
  JENNY_VOICE_JSON: "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_GB/jenny_dioco/medium/en_GB-jenny_dioco-medium.onnx.json"

jobs:
  render:
    name: Synthesize narration with Piper
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Piper TTS
        run: |
          set -euo pipefail
          mkdir -p $HOME/piper
          curl -fsSL "$PIPER_RELEASE" -o /tmp/piper.tgz
          tar -xzf /tmp/piper.tgz -C $HOME/piper --strip-components=1
          echo "$HOME/piper" >> $GITHUB_PATH

      - name: Cache Piper voice models
        id: voice-cache
        uses: actions/cache@v4
        with:
          path: |
            voices/
          key: piper-voices-${{ env.PIPER_VERSION }}-amy-jenny-v1

      - name: Download voice models
        if: steps.voice-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p voices
          curl -fsSL "$AMY_VOICE_URL"   -o voices/en_US-amy-medium.onnx
          curl -fsSL "$AMY_VOICE_JSON"  -o voices/en_US-amy-medium.onnx.json
          curl -fsSL "$JENNY_VOICE_URL"  -o voices/en_GB-jenny_dioco-medium.onnx
          curl -fsSL "$JENNY_VOICE_JSON" -o voices/en_GB-jenny_dioco-medium.onnx.json

      - name: Verify pre-conditions
        run: |
          which piper
          which ffmpeg
          piper --version || true
          ls -la voices/

      - name: Render narration
        env:
          RENDER_NARRATION: "true"
          PIPER_VOICE_DIR: ${{ github.workspace }}/voices
        run: node --import tsx scripts/build-narration.ts

      - name: Verify audio manifest
        run: node --import tsx scripts/verify-audio-manifest.ts

      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs track "*.opus" "*.mp3" "*.bin" || true

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          base: ${{ inputs.target_branch }}
          branch: chore/narration-render-${{ github.run_id }}
          commit-message: |
            chore(audio): re-render Piper narration corpus

            Generated by .github/workflows/render-narration.yml run
            ${{ github.run_id }}.

            Refreshes apps/web/public/audio/** (Opus primary + MP3 fallback)
            and apps/web/public/audio/manifest.json (SHA-256 integrity map).
          title: "chore(audio): re-render Piper narration corpus (run ${{ github.run_id }})"
          body: |
            Automated narration render from `.github/workflows/render-narration.yml`.

            - Voices: `en_US-amy-medium` (Milo), `en_GB-jenny_dioco-medium` (Luna)
            - Source: `content/audio-assets/unit-*.json`
            - Verifier: `pnpm verify:audio` (passes on this branch)
            - LFS: all `.opus` / `.mp3` artifacts tracked

            Review the manifest diff to spot transcript drift; the actual
            audio blobs are LFS pointers.
          labels: |
            audio
            automation
          add-paths: |
            apps/web/public/audio/**
