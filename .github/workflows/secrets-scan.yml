name: Secrets scan

# Defense-in-depth: every push and PR runs gitleaks with the repo's
# `.gitleaks.toml`. A finding fails the job, gates merges, and (on PRs)
# posts a redacted comment so the contributor can fix the leak without
# re-exposing it.
#
# See docs/devops/secrets-management.md and ADR-0014 for the policy.

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
      - "claude/**"

concurrency:
  group: secrets-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history on PRs to scan only the diff
          # against the base branch; on push events it scans the working
          # tree plus the new commits.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Comment on the PR with redacted findings; the action handles
          # redaction so secrets are never reposted into the PR thread.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
          # GITLEAKS_LICENSE is only required for organisation-private
          # repos under the gitleaks paid plan. Public repos run free.
