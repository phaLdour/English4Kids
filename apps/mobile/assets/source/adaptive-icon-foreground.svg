<?xml version="1.0" encoding="UTF-8"?>
<!--
  English4Kids — Android adaptive icon FOREGROUND layer (432x432).

  Android composites this on top of the background layer (see
  adaptive-icon-background.svg). Per the Material guidelines, the visible
  portion is centred in a 264x264 "safe zone" — anything outside may be
  cropped by themed-icon masks (circle, squircle, teardrop, etc.).

  Background here is transparent: Android draws our cream rectangle behind.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <title>English4Kids adaptive icon — Milo the fox (foreground)</title>

  <!-- Milo centred in the 264x264 safe zone (84..348 on each axis). -->
  <g transform="translate(84 84) scale(0.5156)">
    <!-- Same path data as app-icon.svg, recomputed in this viewBox. -->

    <!-- Ears -->
    <path d="M 100 220
             L 200 100
             L 300 250
             Z"
          fill="#F08A4B" stroke="#1F2933" stroke-width="26" stroke-linejoin="round" />
    <path d="M 412 220
             L 312 100
             L 212 250
             Z"
          fill="#F08A4B" stroke="#1F2933" stroke-width="26" stroke-linejoin="round" />

    <!-- Head -->
    <path d="M 70 340
             Q 70 240 200 240
             Q 256 240 256 250
             Q 256 240 312 240
             Q 442 240 442 340
             Q 442 480 360 560
             Q 256 640 256 640
             Q 256 640 152 560
             Q 70 480 70 340 Z"
          fill="#F08A4B" stroke="#1F2933" stroke-width="26" stroke-linejoin="round" />

    <!-- Muzzle -->
    <path d="M 170 440
             Q 170 410 220 410
             L 292 410
             Q 342 410 342 440
             Q 342 540 256 580
             Q 170 540 170 440 Z"
          fill="#FFFFFF" stroke="#1F2933" stroke-width="18" stroke-linejoin="round" />

    <!-- Eyes -->
    <circle cx="196" cy="370" r="22" fill="#1F2933" />
    <circle cx="316" cy="370" r="22" fill="#1F2933" />
    <circle cx="204" cy="362" r="6" fill="#FFFFFF" />
    <circle cx="324" cy="362" r="6" fill="#FFFFFF" />

    <!-- Nose -->
    <path d="M 240 440 L 272 440 L 256 466 Z" fill="#1F2933" stroke="#1F2933" stroke-width="10" stroke-linejoin="round" />

    <!-- Smile -->
    <path d="M 222 510 Q 256 540 290 510" fill="none" stroke="#1F2933" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
