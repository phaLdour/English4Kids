<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" stroke="#1F2933" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
  <title>The numeral 10, with ten orange dots</title>
  <rect x="20" y="20" width="200" height="200" rx="22" fill="#FFF8EE"/>
  <text x="120" y="170" text-anchor="middle" font-family="'Fredoka', system-ui, sans-serif" font-size="130" font-weight="700" fill="#F08A4B" stroke="none">10</text>
  <g fill="#F08A4B" stroke="#1F2933" stroke-width="2">
    <circle cx="40" cy="50" r="7"/>
    <circle cx="60" cy="50" r="7"/>
    <circle cx="80" cy="50" r="7"/>
    <circle cx="100" cy="50" r="7"/>
    <circle cx="120" cy="50" r="7"/>
    <circle cx="140" cy="50" r="7"/>
    <circle cx="160" cy="50" r="7"/>
    <circle cx="180" cy="50" r="7"/>
    <circle cx="200" cy="50" r="7"/>
    <circle cx="220" cy="50" r="7"/>
  </g>
</svg>
